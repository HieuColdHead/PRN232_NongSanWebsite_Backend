name: Build and deploy ASP.Net Core app to an Azure Web App

env:
  AZURE_WEBAPP_NAME: NongXanhBE
  DOTNET_VERSION: '8.0.x'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3. Restore
      - name: Restore dependencies
        run: dotnet restore "NongXanh_BE.sln"

      # 4. Build
      - name: Build
        run: dotnet build "NongXanh_BE.sln" --configuration Release --no-restore

      # 5. Publish (QUAN TRỌNG)
      - name: Publish
        run: dotnet publish "NongXanhController/NongXanhController.csproj" -c Release --no-build -o publish

      # 6. Deploy (fix ở đây)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
